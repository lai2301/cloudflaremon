name = "cloudflare-worker-monitor"
main = "src/index.js"
compatibility_date = "2024-01-01"
[[routes]]
pattern = "mon.pipdor.com"
custom_domain = true
# KV Namespace for storing heartbeat logs
# This file is automatically generated by Terraform
[[kv_namespaces]]
binding = "HEARTBEAT_LOGS"
id = "4bbad78883da446399f2cd8677b989ea"

# Cron trigger - checks for stale heartbeats every 10 minutes.
# Offset by 1 minute (HH:01, HH:11, HH:21, ...) so heartbeat clients that
# fire on HH:00 markers (K3s cronjob, systemd timers) write their per-service
# `latest:<id>` keys before this worker aggregates them into monitor:latest.
# Without the offset, a 4-second race between cron schedulers caused a full
# 10-minute lag in the dashboard.
[triggers]
crons = ["1-59/10 * * * *"]

[observability]
[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true